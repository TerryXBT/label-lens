<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#217a59" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="标签识别" />
    <title>商品标签识别</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="商品标签识别工作区">
        <header class="topbar compact">
          <h1>商品标签识别</h1>
          <p>拍照识别商品名和条形码，必要时涂抹局部修正。</p>
        </header>

        <section class="panel upload-panel">
          <div class="drop-zone" id="dropZone">
            <input id="imageInput" type="file" accept="image/*" capture="environment" />
            <div class="drop-content">
              <span class="camera-guide" aria-hidden="true"></span>
              <span class="upload-icon" aria-hidden="true">+</span>
              <strong>拍照 / 上传标签</strong>
              <span>把黄色或白色标签放进框里</span>
            </div>
          </div>

          <div class="preview-frame" id="previewFrame" hidden>
            <img class="preview" id="preview" alt="上传的标签预览" />
            <canvas class="selection-canvas" id="selectionCanvas"></canvas>
          </div>

          <div class="selection-panel" id="selectionPanel" hidden>
            <span id="selectionHint">用手指涂抹要识别的文字区域</span>
            <label class="stroke-size-control" for="strokeSizeRange">
              <span class="stroke-size-label">笔触大小</span>
              <input type="range" id="strokeSizeRange" min="6" max="30" step="1" value="12" />
              <span class="stroke-size-value" id="strokeSizeValue">12</span>
            </label>
            <div class="selection-actions">
              <button class="ghost-button" id="clearStrokesBtn" type="button" disabled>清除涂抹</button>
              <button class="primary-button" id="recognizeSelectionBtn" type="button" disabled>识别涂抹区域</button>
            </div>
          </div>

          <div class="preview-actions" id="previewActions" hidden>
            <button class="secondary-button" id="replaceImageBtn" type="button">更换图片</button>
            <button class="ghost-button" id="selectNameBtn" type="button">涂抹商品名</button>
            <button class="ghost-button" id="selectBarcodeBtn" type="button">涂抹条形码</button>
            <button class="ghost-button danger" id="removeImageBtn" type="button">移除</button>
          </div>
        </section>

        <section class="panel result-panel">
          <div class="status-row">
            <span class="status-pill idle" id="statusPill">等待图片</span>
            <span class="progress-text" id="progressText"></span>
          </div>
          <div class="suggestion-banner" id="suggestionBanner" hidden>
            <span>商品名可能不完整，建议涂抹完整商品名再识别。</span>
            <button class="ghost-button" id="suggestNameBtn" type="button">涂抹商品名</button>
          </div>

          <label class="field">
            <span class="field-title">商品名</span>
            <textarea id="productName" rows="2" placeholder="识别后自动填写，可手动修改"></textarea>
          </label>
          <div class="field-actions">
            <a class="primary-button disabled" id="productSearchLink" href="#" target="_blank" rel="noopener noreferrer" aria-disabled="true">搜索商品名</a>
            <button class="ghost-button" id="copyProductBtn" type="button" disabled>复制</button>
          </div>

          <label class="field">
            <span class="field-title">条形码</span>
            <input id="barcode" type="text" inputmode="numeric" placeholder="例如 4903333213559" />
          </label>
          <div class="field-actions">
            <a class="secondary-button disabled" id="barcodeSearchLink" href="#" target="_blank" rel="noopener noreferrer" aria-disabled="true">搜索条形码</a>
            <button class="ghost-button" id="copyBarcodeBtn" type="button" disabled>复制</button>
          </div>

          <details class="raw-text">
            <summary>原始文字</summary>
            <pre id="rawText"></pre>
          </details>
        </section>
      </section>
    </main>
  </body>
</html>
